# photo-import watcher — Portainer stack / docker compose.
#
# Folder-watch design (USB passthrough was tested and rejected on this NAS): the
# watcher is UNPRIVILEGED and just processes each batch that Synology USB Copy
# drops into ./incoming — uploads to Immich with immich-go, verifies every file
# by content hash, then pushes "safe to wipe".
#
# Fill in the three REPLACE_ME values (or override them as Portainer stack env).
services:
  watcher:
    image: ghcr.io/dhamma-dev/photo-import-watcher:latest
    container_name: photo-watcher
    restart: unless-stopped
    environment:
      INCOMING: /data/incoming
      STATE_DIR: /data/state
      POLL_SECONDS: "15"
      SETTLE_SECONDS: "20"          # require the copy to be stable this long before touching it
      FAIL_RENOTIFY_SECONDS: "1800" # at most one failure push per 30 min per batch
      UPLOAD_TIMEOUT: "7200"        # kill a stuck immich-go after 2h
      # Immich base URL — NO trailing /api (immich-go wants the base URL):
      IMMICH_INSTANCE_URL: "http://REPLACE_ME_NAS_IP:2283"
      IMMICH_API_KEY: "REPLACE_ME_IMMICH_API_KEY"
      # ntfy topic for the two pushes ("uploading" then "safe to wipe"):
      NTFY_URL: "https://ntfy.sh/REPLACE_ME_TOPIC"
      TZ: "America/Vancouver"
    volumes:
      # Parent of USB Copy's destination (incoming/) and the watcher's state/.
      - /volume1/docker/projects/photo-import:/data
